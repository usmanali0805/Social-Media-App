<!DOCTYPE html>
<html>
<head>
    <title>SocialFeed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>SocialFeed</h2>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="script.js"></script>
</body>
</html>
